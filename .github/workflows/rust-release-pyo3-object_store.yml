name: Publish pyo3-object_store to crates.io
on:
  push:
    # Triggers when pushing tags starting with 'pyo3-object_store-v'
    tags: ["pyo3-object_store-v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    # Optional: for enhanced security
    environment: rust-release-pyo3-object_store
    permissions:
      id-token: write # Required for OIDC token exchange
    steps:
      - uses: actions/checkout@v7
      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1
        id: auth
      - run: cargo publish --manifest-path pyo3-object_store/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
